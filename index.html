<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>JS Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, serif;
        }
        .gameBoard{
            width: 300px;
            height: 300px;
            border: 2px solid black;
            border-radius: 12px;
            margin: 0 0 0 100px;
            background-color: orange;
        }
        .info1, .info2, .info3{
            display: flex;
        }
        #dynamicScoreValue1, #dynamicScoreValue2, #dynamicScoreValue3{
            display: flex;
            align-items: center;
        }
    </style>
</head>

<div class="navBar">
    <div class="logo">
        <h1>Refleksomierzacz</h1>
    </div>
    <div class="Options">
        <button>Start</button>
        <button>Stop</button>
    </div>
</div>
<hr class="dashed">
<div id="app">
    <div class="gameBoard"></div>
</div>
<hr class="dashed">
<div class="Score">
    <div class="info1">
        <h3>Najkrótszy czas reakcji: </h3>
        <p id="dynamicScoreValue1">test</p>
    </div>
    <div class="info2">
        <h3>Najdłuższy czas reakcji: </h3>
        <p id="dynamicScoreValue2">test</p>
    </div>
    <div class="info3">
        <h3>Średni czas reakcji: </h3>
        <p id="dynamicScoreValue3">test</p>
    </div>
</div>

</script>

</html>
